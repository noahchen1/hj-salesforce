<template>
  <div class="table-section">
    <template if:true={disabled}>
      <div class="table-overlay"></div>
    </template>

    <h3 class="table-title">Order Items</h3>

    <template if:true={isSalesOrder}>
      <div class="table-scroll">
        <table class="order-table sales-order-table">
          <colgroup>
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
          </colgroup>
          <thead>
            <tr>
              <th scope="col">Item</th>
              <th scope="col">Display Name</th>
              <th scope="col">Image</th>
              <th scope="col">Quantity Available</th>
              <th scope="col">Quantity Back-ordered</th>
              <th scope="col">Quantity</th>
              <th scope="col">Rate</th>
              <th scope="col">Amount</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={rows} for:item="row" for:index="index">
              <tr key={row.id}>
                <td>
                  <c-lookup-input
                    data-index={index}
                    data-type="item"
                    label=""
                    placeholder="Enter Item Name"
                    onsearch={handleLookupSearch}
                    onselect={handleLookupSelect}
                    onfocus={handleFocus}
                    required
                  ></c-lookup-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="displayName"
                    value={row.displayName}
                    variant="label-hidden"
                    type="text"
                    placeholder=""
                    onchange={handleRowChange}
                    onfocus={handleFocus}
                    readonly
                  ></lightning-input>
                </td>
                <td>
                  <img src={row.imageUrl} alt="" class="item-image" />
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantityAvailable"
                    value={row.quantityAvailable}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantityBackordered"
                    value={row.quantityBackordered}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>

                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantity"
                    value={row.quantity}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    onchange={handleRowChange}
                    onfocus={handleFocus}
                    disabled={row.isDiscount}
                  ></lightning-input>
                </td>
                <td>
                  <template if:true={row.isDiscount}>
                    <lightning-input
                      data-index={index}
                      data-field="rate"
                      value={row.rate}
                      variant="label-hidden"
                      type="text"
                      placeholder="Enter a Number/Percent"
                      onchange={handleRowChange}
                      onfocus={handleFocus}
                      required
                    ></lightning-input>
                  </template>
                  <template if:false={row.isDiscount}>
                    <lightning-input
                      data-index={index}
                      data-field="rate"
                      value={row.rate}
                      variant="label-hidden"
                      type="number"
                      formatter="currency"
                      step="0.01"
                      placeholder=""
                      onchange={handleRowChange}
                      onfocus={handleFocus}
                      required
                    ></lightning-input>
                  </template>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="amount"
                    value={row.amount}
                    variant="label-hidden"
                    type="number"
                    formatter="currency"
                    step="0.01"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
              </tr>
            </template>
            <template if:true={hasRows}>
              <tr class="row-action-row">
                <td colspan="8">
                  <div class="row-action-container">
                    <lightning-button
                      label="Add Row"
                      data-index={activeRowIndex}
                      onclick={addRow}
                    ></lightning-button>
                    <lightning-button
                      label="Remove Row"
                      data-index={activeRowIndex}
                      onclick={removeRow}
                      disabled={isActiveRowRemoveDisabled}
                    ></lightning-button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>

    <template if:true={isSpecialOrder}>
      <div class="table-scroll">
        <table class="order-table special-order-table">
          <colgroup>
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
            <col class="order-col" />
          </colgroup>
          <thead>
            <tr>
              <th scope="col">Item</th>
              <th scope="col">HJ SKU</th>
              <th scope="col">Vendor Item Number</th>
              <th scope="col">Display Name</th>
              <th scope="col">Quantity Available</th>
              <th scope="col">Quantity Back-ordered</th>
              <th scope="col">Quantity</th>
              <th scope="col">Quoted Price</th>
              <th scope="col">Rate</th>
              <th scope="col">Amount</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={rows} for:item="row" for:index="index">
              <tr key={row.id}>
                <td>
                  <c-lookup-input
                    data-index={index}
                    data-type="item"
                    label=""
                    placeholder="Enter Item Name"
                    onsearch={handleLookupSearch}
                    onselect={handleLookupSelect}
                    onfocus={handleFocus}
                    required
                  ></c-lookup-input>
                </td>
                <td>
                  <template if:false={row.isDiscount}>
                    <c-lookup-input
                      data-index={index}
                      data-type="specialOrderItem"
                      label=""
                      placeholder="Enter Item Name"
                      onsearch={handleLookupSearch}
                      onselect={handleLookupSelect}
                      onblur={handleLookupBlur}
                      onfocus={handleFocus}
                    ></c-lookup-input>
                  </template>
                </td>
                <td>
                  <template if:false={row.isDiscount}>
                    <c-lookup-input
                      data-index={index}
                      data-type="specialOrderVendorNum"
                      label=""
                      placeholder="Enter Vendor Number"
                      onsearch={handleLookupSearch}
                      onselect={handleLookupSelect}
                      onblur={handleLookupBlur}
                      onfocus={handleFocus}
                    ></c-lookup-input>
                  </template>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="displayName"
                    value={row.displayName}
                    variant="label-hidden"
                    type="text"
                    placeholder=""
                    onchange={handleRowChange}
                    onfocus={handleFocus}
                    readonly
                  ></lightning-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantityAvailable"
                    value={row.quantityAvailable}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantityBackordered"
                    value={row.quantityBackordered}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quantity"
                    value={row.quantity}
                    variant="label-hidden"
                    type="number"
                    placeholder=""
                    onchange={handleRowChange}
                    onfocus={handleFocus}
                    disabled={row.isDiscount}
                  ></lightning-input>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="quotedPrice"
                    value={row.quotedPrice}
                    variant="label-hidden"
                    type="number"
                    formatter="currency"
                    step="0.01"
                    placeholder=""
                    onchange={handleRowChange}
                    onfocus={handleFocus}
                    disabled={row.isDiscount}
                    required
                  ></lightning-input>
                </td>
                <td>
                  <template if:true={row.isDiscount}>
                    <lightning-input
                      data-index={index}
                      data-field="rate"
                      value={row.rate}
                      variant="label-hidden"
                      type="text"
                      placeholder="Enter a Number/Percent"
                      onchange={handleRowChange}
                      onfocus={handleFocus}
                      required
                    ></lightning-input>
                  </template>
                  <template if:false={row.isDiscount}>
                    <lightning-input
                      data-index={index}
                      data-field="rate"
                      value={row.rate}
                      variant="label-hidden"
                      type="number"
                      formatter="currency"
                      step="0.01"
                      placeholder=""
                      onchange={handleRowChange}
                      onfocus={handleFocus}
                      required
                    ></lightning-input>
                  </template>
                </td>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="amount"
                    value={row.amount}
                    variant="label-hidden"
                    type="number"
                    formatter="currency"
                    step="0.01"
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
              </tr>
            </template>
            <template if:true={hasRows}>
              <tr class="row-action-row">
                <td colspan="10">
                  <div class="row-action-container">
                    <lightning-button
                      label="Add Row"
                      data-index={activeRowIndex}
                      onclick={addRow}
                    ></lightning-button>
                    <lightning-button
                      label="Remove Row"
                      data-index={activeRowIndex}
                      onclick={removeRow}
                      disabled={isActiveRowRemoveDisabled}
                    ></lightning-button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
  </div>
</template>
