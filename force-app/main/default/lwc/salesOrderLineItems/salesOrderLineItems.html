<template>
  <div class="table-section">
    <template if:true={disabled}>
      <div class="table-overlay"></div>
    </template>

    <h3 class="table-title">Order Items</h3>
    <table class="order-table">
      <thead>
        <tr>
          <th scope="col">Item</th>
          <th scope="col">Quantity</th>
          <th scope="col">Rate</th>
          <th scope="col">Amount</th>
        </tr>
      </thead>
      <tbody>
        <template for:each={rows} for:item="row" for:index="index">
          <tr key={row.id}>
            <td>
              <c-lookup-input
                data-index={index}
                data-type="item"
                label=""
                placeholder="Enter Item Name"
                onsearch={handleLookupSearch}
                onselect={handleLookupSelect}
                onfocus={handleFocus}
              ></c-lookup-input>
              <template if:true={row.showAction}>
                <div class="row-action-container">
                  <lightning-button
                    label="Add Row"
                    data-index={index}
                    onclick={addRow}
                  ></lightning-button>
                  <lightning-button
                    label="Remove Row"
                    data-index={index}
                    onclick={removeRow}
                    disabled={row.disableRemove}
                  ></lightning-button>
                </div>
              </template>
            </td>
            <td>
              <lightning-input
                data-index={index}
                data-field="quantity"
                value={row.quantity}
                variant="label-hidden"
                type="number"
                placeholder=""
                onchange={handleRowChange}
                onfocus={handleFocus}
                disabled={row.isDiscount}
              ></lightning-input>
            </td>
            <td>
              <template if:true={row.isDiscount}>
                <lightning-input
                  data-index={index}
                  data-field="rate"
                  value={row.rate}
                  variant="label-hidden"
                  type="text"
                  placeholder="Enter a Number/Percent"
                  onchange={handleRowChange}
                  onfocus={handleFocus}
                ></lightning-input>
              </template>
              <template if:false={row.isDiscount}>
                <lightning-input
                  data-index={index}
                  data-field="rate"
                  value={row.rate}
                  variant="label-hidden"
                  type="number"
                  formatter="currency"
                  step="0.01"
                  placeholder=""
                  onchange={handleRowChange}
                  onfocus={handleFocus}
                ></lightning-input>
              </template>
            </td>
            <td>
              <lightning-input
                data-index={index}
                data-field="amount"
                value={row.amount}
                variant="label-hidden"
                type="number"
                formatter="currency"
                step="0.01"
                placeholder=""
                readonly
              ></lightning-input>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</template>
