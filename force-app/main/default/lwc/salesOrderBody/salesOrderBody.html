<template>
  <div class="form-body">
    <lightning-combobox
      name="orderType"
      label="Order Type"
      value={orderType}
      placeholder="Select a Order Tyep"
      options={orderTypeOptions}
      onchange={handleComboboxChange}
      disabled={isOrderTypeDisabled}
    ></lightning-combobox>
  </div>

  <template if:true={isSalesOrder}>
    <div class="form-body">
      <c-lookup-input
        data-type="customer"
        label="Customer"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <lightning-input
        label="Date"
        data-type="date"
        type="date"
        value={date}
        onchange={handleInputChange}
      ></lightning-input>
      <c-lookup-input
        data-type="salesRep1"
        label="Sales Rep"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <c-lookup-input
        data-type="salesRep2"
        label="Sales Rep 2"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <lightning-input
        label="Memo"
        data-type="memo"
        type="text"
        value={memo}
        onchange={handleInputChange}
      ></lightning-input>
      <lightning-combobox
        name="subsidiary"
        label="Subsidiary"
        value={subsidiary}
        placeholder="Select a subsidiary"
        options={subsidiaryOptions}
        onchange={handleComboboxChange}
      ></lightning-combobox>
      <lightning-combobox
        name="location"
        label="Location"
        value={location}
        placeholder="Select a location"
        options={locationOptions}
        onchange={handleComboboxChange}
        disabled={isLocationDisabled}
      ></lightning-combobox>
    </div>
  </template>

  <template if:true={isSpecialOrder}>
    <div class="form-body">
      <c-lookup-input
        data-type="customer"
        label="Customer"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <lightning-input
        label="Date"
        data-type="date"
        type="date"
        value={date}
        onchange={handleInputChange}
      ></lightning-input>
      <lightning-input
        label="Special Order Date"
        data-type="speicialDate"
        type="date"
        value={specialDate}
        onchange={handleInputChange}
      ></lightning-input>
      <lightning-input
        label="Need By Date"
        data-type="needByDate"
        type="date"
        value={needByDate}
        onchange={handleInputChange}
      ></lightning-input>
      <lightning-combobox
        name="specialOrderItemType"
        label="Special Order Item Type"
        value={specialOrderItemType}
        placeholder="Select an item type"
        options={specialItemTypeOptions}
        onchange={handleComboboxChange}
      ></lightning-combobox>
      <c-lookup-input
        data-type="specialOrderVendor"
        label="Special Order Vendor"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <lightning-input
        label="Requested Vendor"
        data-type="specialOrderRequestedVendor"
        type="text"
        value={specialOrderRequestedVendor}
      ></lightning-input>
      <lightning-textarea
        label="Comments/DESC/Metal/Color/Size"
        value={specialOrderComments}
      ></lightning-textarea>
      <lightning-textarea
        label="Merchandise Note"
        value={specialOrderNotes}
      ></lightning-textarea>
      <lightning-combobox
        name="specialOrderMemoOrSold"
        label="Memo Or Sold"
        value={specialOrderMemoOrSold}
        placeholder="Select An Option"
        options={memoOrSoldOptions}
        onchange={handleComboboxChange}
      ></lightning-combobox>
      <c-lookup-input
        data-type="salesRep1"
        label="Sales Rep"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <c-lookup-input
        data-type="salesRep2"
        label="Sales Rep 2"
        placeholder="Enter Name"
        onsearch={handleLookupSearch}
        onselect={handleLookupSelect}
      ></c-lookup-input>
      <lightning-input
        label="Memo"
        data-type="memo"
        type="text"
        value={memo}
        onchange={handleInputChange}
      ></lightning-input>
      <lightning-combobox
        name="subsidiary"
        label="Subsidiary"
        value={subsidiary}
        placeholder="Select a subsidiary"
        options={subsidiaryOptions}
        onchange={handleComboboxChange}
      ></lightning-combobox>
      <lightning-combobox
        name="location"
        label="Location"
        value={location}
        placeholder="Select a location"
        options={locationOptions}
        onchange={handleComboboxChange}
        disabled={isLocationDisabled}
      ></lightning-combobox>
    </div>
  </template>
</template>
