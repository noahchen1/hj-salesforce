<template>
  <lightning-card>
    <div class="main-container">
      <div if:true={isLoading} class="spinner-container">
        <div class="spinner-content">
          <lightning-spinner
            alternative-text="Loading sales order..."
            size="medium"
          ></lightning-spinner>
          <template if:true={showLoadingMessage}>
            <p class="spinner-message">{loadingMessage}</p>
          </template>
        </div>
      </div>

      <template if:false={isSpecialOrder}>
        <div class="title">Sales Order Form</div>
      </template>

      <template if:true={isSpecialOrder}>
        <div class="title">Special Order Form</div>
      </template>

      <div class="btn-container">
        <lightning-button
          label="Save"
          variant="brand"
          onclick={saveOrder}
          disabled={isLoading}
        ></lightning-button>
      </div>

      <c-sales-order-body
        subsidiary-options={subsidiaryOptions}
        location-options={locationOptions}
        date={formState.date}
        subsidiary={formState.subsidiary}
        location={formState.location}
        memo={formState.memo}
        order-type={formState.orderType}
        payment-term={formState.paymentTerm}
        special-date={formState.specialDate}
        need-by-date={formState.needByDate}
        special-order-item-type={formState.specialOrderItemType}
        special-order-vendor={formState.specialOrderVendor}
        special-order-requested-vendor={formState.specialOrderRequestedVendor}
        special-order-comments={formState.specialOrderComments}
        special-order-notes={formState.specialOrderNotes}
        special-order-memo-or-sold={formState.specialOrderMemoOrSold}
        special-order-status={formState.specialOrderStatus}
        is-order-type-disabled={isOrderTypeDisabled}
        is-subsidiary-disbaled={isSubsidiaryDisbaled}
        oncustomerselect={handleCustomerSelect}
        onsalesrepselect={handleSalesRepSelect}
        onspecialordervendorselect={handleSpecialOrderVendorSelect}
        onfieldchange={handleHeaderFieldChange}
        onfieldclear={handleHeaderFieldClear}
        oncomboboxchange={handleHeaderComboboxChange}
      ></c-sales-order-body>

      <c-sales-order-address
        address-options={addressOptions}
        selected-location={formState.location}
        order-type={formState.orderType}
        onaddressstatechange={handleAddressStateChange}
      ></c-sales-order-address>

      <c-sales-order-line-items
        location={formState.location}
        special-order-status={formState.specialOrderStatus}
        disabled={showTableOverlay}
        order-type={formState.orderType}
        onlineitemschange={handleLineItemsChange}
      ></c-sales-order-line-items>
    </div>
  </lightning-card>
</template>
