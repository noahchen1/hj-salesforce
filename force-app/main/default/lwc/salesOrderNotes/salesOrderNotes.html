<template>
  <div class="table-section">
    <div class="table-scroll">
      <table class="order-table sales-order-table">
        <colgroup>
          <col class="owner-col" />
          <col class="title-col" />
          <col class="type-col" />
          <col class="direction-col" />
          <col class="memo-col" />
          <col class="date-col" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col">Owner</th>
            <th scope="col">Title</th>
            <th scope="col">Type</th>
            <th scope="col">Direction</th>
            <th scope="col">Memo</th>
            <th scope="col">Date Last Modified</th>
          </tr>
        </thead>
        <tbody>
          <template for:each={rows} for:item="row" for:index="index">
            <tr key={row.id}>
              <td>
                <lightning-input
                  data-index={index}
                  data-field="owner"
                  type="text"
                  value={row.owner}
                  placeholder=""
                  onfocus={handleFocus}
                  onchange={handleRowChange}
                  readonly
                ></lightning-input>
              </td>
              <td>
                <lightning-input
                  data-index={index}
                  data-field="title"
                  type="text"
                  value={row.title}
                  placeholder=""
                  onfocus={handleFocus}
                  oninput={handleRowChange}
                  onchange={handleRowChange}
                ></lightning-input>
              </td>
              <td>
                <lightning-combobox
                  data-index={index}
                  data-field="type"
                  value={row.type}
                  options={typeOptions}
                  onchange={handleRowChange}
                ></lightning-combobox>
              </td>
              <td>
                <lightning-combobox
                  data-index={index}
                  data-field="direction"
                  value={row.direction}
                  options={directionOptions}
                  onchange={handleRowChange}
                ></lightning-combobox>
              </td>
              <td>
                <lightning-textarea
                  data-index={index}
                  data-field="memo"
                  value={row.memo}
                  placeholder=""
                  onfocus={handleFocus}
                  oninput={handleRowChange}
                  onchange={handleRowChange}
                ></lightning-textarea>
              </td>
              <td>
                <lightning-input
                  data-index={index}
                  data-field="dateLastModified"
                  value={row.dateLastModified}
                  type="datetime"
                  placeholder=""
                  onfocus={handleFocus}
                  onchange={handleRowChange}
                  readonly
                ></lightning-input>
              </td>
            </tr>
          </template>
          <template if:true={hasRows}>
            <tr class="row-action-row">
              <td colspan="5">
                <div class="row-action-container">
                  <lightning-button
                    label="Add Row"
                    data-index={activeRowIndex}
                    onclick={addRow}
                  ></lightning-button>
                  <lightning-button
                    label="Remove Row"
                    data-index={activeRowIndex}
                    onclick={removeRow}
                    disabled={isActiveRowRemoveDisabled}
                  ></lightning-button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</template>
