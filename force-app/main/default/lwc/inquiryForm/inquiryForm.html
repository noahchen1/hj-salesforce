<template>
  <lightning-card>
    <div class="main-container">
      <div if:true={isLoading} class="spinner-container">
        <lightning-spinner
          alternative-text="Loading..."
          size="medium"
        ></lightning-spinner>
      </div>

      <div class="title">Rolex Inquiry</div>

      <div class="btn-container">
        <lightning-button
          label="Create Orders"
          variant="brand"
          onclick={saveOrder}
          disabled={isLoading}
        ></lightning-button>
      </div>

      <c-inquiry-form-body></c-inquiry-form-body>

      <c-inquiry-form-items
        section-title="Model 1"
        model-label="MODEL #1"
        name-label="FULL NAME OF WATCH #1"
        link-label="ROLEX WATCH LINK #1"
        toggle-require-model
        toggle-require-name
        toggle-require-link
        toggle-fields
      ></c-inquiry-form-items>

      <c-inquiry-form-items
        section-title="Model 2"
        model-label="MODEL #2"
        name-label="FULL NAME OF WATCH #2"
        link-label="ROLEX WATCH LINK #2"
      ></c-inquiry-form-items>

      <c-inquiry-form-items
        section-title="Model 3"
        model-label="MODEL #3"
        name-label="FULL NAME OF WATCH #3"
        link-label="ROLEX WATCH LINK #3"
      ></c-inquiry-form-items>
    </div>
  </lightning-card>
</template>
