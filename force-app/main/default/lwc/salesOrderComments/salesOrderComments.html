<template>
  <div class="table-section">
    <div class="table-scroll">
      <table class="order-table sales-order-table">
        <colgroup>
          <col class="owner-col" />
          <col class="comment-col" />
          <col class="date-col" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col">Owner</th>
            <th scope="col">Comment</th>
          </tr>
        </thead>
        <tbody>
          <template for:each={rows} for:item="row" for:index="index">
            <tr key={row.id}>
              <td>
                <lightning-input
                  data-index={index}
                  data-field="nsEmployee"
                  type="text"
                  value={row.nsEmployee}
                  placeholder=""
                  onfocus={handleFocus}
                  onchange={handleRowChange}
                  readonly
                ></lightning-input>
              </td>
              <td>
                <lightning-textarea
                  data-index={index}
                  data-field="comment"
                  value={row.comment}
                  placeholder=""
                  onfocus={handleFocus}
                  oninput={handleRowChange}
                  onchange={handleRowChange}
                ></lightning-textarea>
              </td>
            </tr>
          </template>
          <template if:true={hasRows}>
            <tr class="row-action-row">
              <td colspan="3">
                <div class="row-action-container">
                  <lightning-button
                    label="Add Row"
                    data-index={activeRowIndex}
                    onclick={addRow}
                  ></lightning-button>
                  <lightning-button
                    label="Remove Row"
                    data-index={activeRowIndex}
                    onclick={removeRow}
                    disabled={isActiveRowRemoveDisabled}
                  ></lightning-button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</template>
