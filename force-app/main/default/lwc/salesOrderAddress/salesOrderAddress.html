<template>
  <div>
    <div class="section-title">Address:</div>
    <div class="form-body">
      <lightning-input
        data-type="isInStorePickup"
        type="checkbox"
        label="In Store Pickup?"
        checked={isInStorePickup}
        onchange={handleInputChange}
        disabled={isInStorePickupDisabled}
      ></lightning-input>
    </div>
    <div class="form-body">
      <lightning-combobox
        name="selectedShippingAddress"
        label="Shipping Address"
        value={selectedShippingAddress}
        placeholder="Select an address"
        options={addressOptions}
        onchange={handleComboboxChange}
        disabled={isAddressSelectorDisabled}
      ></lightning-combobox>
      <lightning-combobox
        name="selectedBillingAddress"
        label="Billing Address"
        value={selectedBillingAddress}
        placeholder="Select an address"
        options={addressOptions}
        onchange={handleComboboxChange}
        disabled={isAddressSelectorDisabled}
      ></lightning-combobox>
    </div>
    <div class="form-body">
      <lightning-textarea
        label="Shipping Address"
        value={shippingAddress}
        readonly
      ></lightning-textarea>
      <lightning-textarea
        label="Billing Address"
        value={billingAddress}
        readonly
      ></lightning-textarea>
    </div>
  </div>
</template>
