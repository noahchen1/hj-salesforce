<template>
  <div class="table-section">
    <div class="upload-actions">
      <lightning-file-upload
        label=""
        name="fileUploader"
        onuploadfinished={handleUploadFinished}
        multiple
      >
      </lightning-file-upload>
      <lightning-button
        label="Take Photo"
        class="take-photo-btn"
        icon-name="utility:photo"
        onclick={handleTakePhotoClick}
        disabled={isSavingPhoto}
      ></lightning-button>
    </div>
    <template if:true={isCameraOpen}>
      <section class="camera-panel" aria-label="Camera preview">
        <div class="camera-preview">
          <video class="camera-video"></video>
          <canvas class="camera-canvas"></canvas>
        </div>

        <div class="camera-actions">
          <lightning-button
            label="Cancel"
            onclick={handleCancelCameraClick}
            disabled={isSavingPhoto}
          ></lightning-button>
          <lightning-button
            label="Capture"
            variant="brand"
            icon-name="utility:photo"
            onclick={handleCapturePhotoClick}
            disabled={isSavingPhoto}
          ></lightning-button>
        </div>
      </section>
    </template>
    <div class="table-scroll">
      <table class="order-table sales-order-table">
        <colgroup>
          <col class="file-col" />
          <col />
        </colgroup>
        <thead>
          <tr>
            <th scope="col">File</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody>
          <template for:each={rows} for:item="row">
            <tr key={row.id}>
              <td>
                <lightning-formatted-url
                  value={row.fileUrl}
                  label={row.name}
                  target="_blank"
                ></lightning-formatted-url>
              </td>
              <td>
                <lightning-button-icon
                  icon-name="utility:delete"
                  variant="bare"
                  title="Remove file"
                  data-row-id={row.id}
                  data-document-id={row.documentId}
                  onclick={handleRemoveClick}
                  disabled={isLoading}
                ></lightning-button-icon>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</template>
