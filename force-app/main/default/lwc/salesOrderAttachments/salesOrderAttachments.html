<template>
  <div class="table-section">
    <template if:true={isRepairOrder}>
      <div class="table-scroll">
        <table class="order-table sales-order-table">
          <colgroup>
            <col class="file-col" />
          </colgroup>
          <thead>
            <tr>
              <th scope="col">File</th>
            </tr>
          </thead>
          <tbody>
            <template for:each={rows} for:item="row" for:index="index">
              <tr key={row.id}>
                <td>
                  <lightning-input
                    data-index={index}
                    data-field="fileUrl"
                    type="url"
                    value={row.fileUrl}
                    placeholder=""
                    readonly
                  ></lightning-input>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
  </div>
</template>
