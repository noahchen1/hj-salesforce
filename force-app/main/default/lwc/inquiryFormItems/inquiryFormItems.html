<template>
  <div class="section-title" onclick={handleHeaderClick}>
    <lightning-icon
      icon-name={toggleIcon}
      size="x-small"
      alternative-text={toggleText}
      class="toggle-icon"
    ></lightning-icon>
    <span>{sectionTitle}</span>
  </div>
  <template if:true={areFieldsVisible}>
    <div class="form-body">
      <lightning-input
        label={modelLabel}
        data-type="model"
        type="text"
        value={model}
        onchange={handleInputChange}
        required={isModelRequired}
      ></lightning-input>
      <lightning-input
        label={nameLabel}
        data-type="name"
        type="text"
        value={name}
        onchange={handleInputChange}
        required={isNameRequired}
      ></lightning-input>
      <lightning-input
        label={linkLabel}
        data-type="link"
        type="text"
        value={link}
        onchange={handleInputChange}
        required={isLinkRequired}
      ></lightning-input>
      <div class="checkbox-group">
        <lightning-input
          data-type="isPriority"
          type="checkbox"
          label="Priority"
          checked={isPriority}
          onchange={handleInputChange}
        ></lightning-input>
        <lightning-input
          data-type="isOpenDial"
          type="checkbox"
          label="Open Dial"
          checked={isOpenDial}
          onchange={handleInputChange}
        ></lightning-input>
      </div>
    </div>
  </template>
</template>
